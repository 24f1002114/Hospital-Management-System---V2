name: Deploy HMS to VPS

on:
push:
branches:
- production

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Deploy to VPS
    uses: appleboy/ssh-action@v1.0.3

    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_SSH_KEY }}
      port: 22

      script: |
        cd /var/www/Hospital-Management-System---V2

        echo "Pull latest code"
        git checkout production
        git pull origin production

        echo "Activate virtual environment"
        source hms/bin/activate

        echo "Install backend dependencies"
        pip install -r requirements.txt

        echo "Build frontend"
        cd frontend
        npm install
        npm run build

        echo "Copy frontend build"
        sudo rm -rf /var/www/hms-frontend/*
        sudo cp -r dist/* /var/www/hms-frontend/

        echo "Restart backend"
        sudo systemctl restart hms-gunicorn

        echo "Restart nginx"
        sudo systemctl restart nginx

        echo "Deployment completed successfully"
