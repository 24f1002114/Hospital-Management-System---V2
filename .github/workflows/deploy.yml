name: Deploy HMS to VPS

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps --maxsockets=1

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Check Backend Syntax
        working-directory: ./backend
        run: |
          python -m py_compile app.py
          python -m py_compile application/*.py

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "📦 Starting Deployment..."

            cd /var/www/Hospital-Management-System---V2

            git fetch origin production
            git reset --hard origin/production

            # ── Docker Deploy ──────────────────────────────────────────────
            echo "🐳 Building and Starting Docker Containers..."
            docker compose down

            # migrate service runs alembic upgrade head + seed automatically
            docker compose up --build -d

            # ── Wait for backend to be healthy ─────────────────────────────
            echo "⏳ Waiting for backend to be healthy..."
            timeout 120 bash -c 'until docker compose ps | grep hms-backend | grep -q "healthy"; do sleep 5; done'

            # ── Health Check ───────────────────────────────────────────────
            echo "🔍 Checking Container Status..."
            docker compose ps

            # ── Verify migration ran ───────────────────────────────────────
            echo "🗄️ Verifying migrations..."
            docker compose exec -T postgres psql -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} -c "SELECT * FROM alembic_version;"

            # ── Cleanup old images ─────────────────────────────────────────
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "🎉 Deployment Successful!"

      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment completed successfully"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed"
          echo "Check logs with: docker compose logs"