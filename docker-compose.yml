services:
  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hms-redis
    restart: unless-stopped
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    container_name: hms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hms-network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: hms-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    env_file:
      - ./backend/application/.env
    environment:
      - ENV=prod
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Celery Worker ──────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: hms-celery
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    command: celery -A app.celery worker --loglevel=info --concurrency=1
    env_file:
      - ./backend/application/.env
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - hms-network

  # ── Celery Beat ────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: hms-celery-beat
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    command: celery -A app.celery beat --loglevel=info
    env_file:
      - ./backend/application/.env
    environment:
      - ENV=prod
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - hms-network

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: hms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - ENV=${ENV}
      - DOMAIN=${DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hms-network

volumes:
  postgres_data:

networks:
  hms-network:
    driver: bridge
