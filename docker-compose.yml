services:
  # ── Redis (message broker for Celery) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: hms-redis
    restart: unless-stopped
    networks:
      - hms-network

  # ── Backend (Flask + Gunicorn) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    env_file:
      - ./backend/application/.env
    environment:
      - ENV=prod
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - hms-network

  # ── Celery Worker ──────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-celery
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    command: celery -A app.celery worker --loglevel=info --concurrency=1
    env_file:
      - ./backend/application/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    networks:
      - hms-network

  # ── Celery Beat ────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-celery-beat
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_IP:-host-gateway}"
    command: celery -A app.celery beat --loglevel=info
    env_file:
      - ./backend/application/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    networks:
      - hms-network

  # ── Frontend (Vue + Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - ENV=${ENV}
      - DOMAIN=${DOMAIN}
    depends_on:
      - backend
    networks:
      - hms-network

networks:
  hms-network:
    driver: bridge
