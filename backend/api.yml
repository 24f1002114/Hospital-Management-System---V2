openapi: 3.0.3
info:
  title: Hospital Management System API
  version: 1.0.0
  description: API documentation for Hospital Management System (hmsdesk.app)

servers:
  - url: https://hmsdesk.app
    description: Production
  - url: http://localhost:8000
    description: Local Development

components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: Authentication-Token
      in: header

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        auth_token:
          type: string

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string

    Doctor:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
        degree:
          type: string
        specialization:
          type: string
        years_of_experience:
          type: integer
        bio:
          type: string
        departments:
          type: array
          items:
            type: integer

    Patient:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
        contact_number:
          type: string
        address:
          type: string
        medical_history:
          type: string

    Appointment:
      type: object
      properties:
        id:
          type: integer
        doctor_id:
          type: integer
        department:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        status:
          type: string

    Treatment:
      type: object
      properties:
        id:
          type: integer
        appointment_id:
          type: integer
        visit_type:
          type: string
        tests_done:
          type: string
        diagnosis:
          type: string
        prescription:
          type: string
        notes:
          type: string
        next_visit_date:
          type: string
          format: date
        medicines:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              dosage:
                type: string
              duration_days:
                type: integer

    Medicine:
      type: object
      required: [name, dosage, duration_days]
      properties:
        name:
          type: string
          example: Amlodipine
        dosage:
          type: string
          example: 1-0-0
        duration_days:
          type: integer
          example: 30

    Availability:
      type: object
      required: [day_of_week, start_time, end_time]
      properties:
        day_of_week:
          type: string
          example: Monday
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "17:00"
        is_active:
          type: boolean
          example: true

security:
  - apiKey: []

tags:
  - name: Authentication
    description: Login, register and token validation
  - name: Departments
    description: Manage hospital departments
  - name: Doctors
    description: Manage doctors
  - name: Patients
    description: Manage patients
  - name: Appointments
    description: Book and manage appointments
  - name: Treatments
    description: Manage treatments
  - name: Availability
    description: Manage doctor availability
  - name: Blacklist
    description: Blacklist/unblacklist users
  - name: Search
    description: Search doctors and patients
  - name: Dashboard
    description: Admin and patient dashboards
  - name: Backend Jobs
    description: Async CSV export tasks

paths:

  # ── Authentication ────────────────────────────────────────────────────────

  /api/login:
    post:
      tags: [Authentication]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: "********"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/register:
    post:
      tags: [Authentication]
      summary: Register Patient
      operationId: registerPatient
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  example: patient@example.com
                username:
                  type: string
                  example: patient1
                password:
                  type: string
                  example: "********"
                name:
                  type: string
                  example: John Doe
                age:
                  type: integer
                  example: 30
                gender:
                  type: string
                  example: Male
                contact_number:
                  type: string
                  example: "+1234567890"
                address:
                  type: string
                  example: 123 Main St
                medical_history:
                  type: string
                  example: No known allergies
      responses:
        '201':
          description: Patient registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: User already exists or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/validate-token:
    get:
      tags: [Authentication]
      summary: Validate Token
      operationId: validateToken
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # ── Departments ───────────────────────────────────────────────────────────

  /api/departments:
    get:
      tags: [Departments]
      summary: Get All Departments
      operationId: getAllDepartments
      responses:
        '200':
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
        '401':
          description: Unauthorized

    post:
      tags: [Departments]
      summary: Create Department
      operationId: createDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Cardiology
                description:
                  type: string
                  example: Heart and cardiovascular diseases
      responses:
        '201':
          description: Department created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - admin only

  /api/department/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1

    get:
      tags: [Departments]
      summary: Get Single Department
      operationId: getSingleDepartment
      responses:
        '200':
          description: Department details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '404':
          description: Not found

    put:
      tags: [Departments]
      summary: Update Department
      operationId: updateDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Cardiology Department
                description:
                  type: string
                  example: Updated description
      responses:
        '200':
          description: Department updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

    delete:
      tags: [Departments]
      summary: Delete Department
      operationId: deleteDepartment
      responses:
        '200':
          description: Department deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  # ── Doctors ───────────────────────────────────────────────────────────────

  /api/doctors:
    get:
      tags: [Doctors]
      summary: Get All Doctors
      operationId: getAllDoctors
      responses:
        '200':
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Doctor'

    post:
      tags: [Doctors]
      summary: Create Doctor
      operationId: createDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, name, degree, specialization, years_of_experience]
              properties:
                email:
                  type: string
                  example: doctor@example.com
                username:
                  type: string
                  example: doc1
                name:
                  type: string
                  example: Dr. John Smith
                age:
                  type: integer
                  example: 45
                gender:
                  type: string
                  example: Male
                degree:
                  type: string
                  example: MBBS
                specialization:
                  type: string
                  example: Neurologist
                years_of_experience:
                  type: integer
                  example: 15
                bio:
                  type: string
                  example: Experienced Neurologist
                departments:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
      responses:
        '201':
          description: Doctor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - admin only

  /api/doctor/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1

    get:
      tags: [Doctors]
      summary: Get Single Doctor
      operationId: getSingleDoctor
      responses:
        '200':
          description: Doctor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '404':
          description: Not found

    put:
      tags: [Doctors]
      summary: Update Doctor
      operationId: updateDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                age:
                  type: integer
                specialization:
                  type: string
                departments:
                  type: array
                  items:
                    type: integer
                  example: [1]
      responses:
        '200':
          description: Doctor updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

    delete:
      tags: [Doctors]
      summary: Delete Doctor
      operationId: deleteDoctor
      responses:
        '200':
          description: Doctor deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  # ── Patients ──────────────────────────────────────────────────────────────

  /api/patients:
    get:
      tags: [Patients]
      summary: Get All Patients
      operationId: getAllPatients
      responses:
        '200':
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
        '401':
          description: Unauthorized

  /api/patient/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1

    get:
      tags: [Patients]
      summary: Get Single Patient
      operationId: getSinglePatient
      responses:
        '200':
          description: Patient details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      tags: [Patients]
      summary: Update Patient
      operationId: updatePatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                age:
                  type: integer
                  example: 40
                medical_history:
                  type: string
                  example: Updated medical history
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

    delete:
      tags: [Patients]
      summary: Delete Patient
      operationId: deletePatient
      responses:
        '200':
          description: Patient deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  # ── Appointments ──────────────────────────────────────────────────────────

  /api/appointments:
    get:
      tags: [Appointments]
      summary: Get All Appointments
      operationId: getAllAppointments
      responses:
        '200':
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized

    post:
      tags: [Appointments]
      summary: Book Appointment
      operationId: bookAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doctor_id, department, date, time]
              properties:
                doctor_id:
                  type: integer
                  example: 2
                department:
                  type: string
                  example: Cardiology
                date:
                  type: string
                  format: date
                  example: "2025-12-02"
                time:
                  type: string
                  example: "10:00"
                status:
                  type: string
                  example: Booked
      responses:
        '201':
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized

  /api/appointment/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1

    get:
      tags: [Appointments]
      summary: Get Single Appointment
      operationId: getSingleAppointment
      responses:
        '200':
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    put:
      tags: [Appointments]
      summary: Update Appointment
      operationId: updateAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: Rescheduled
                date:
                  type: string
                  format: date
                  example: "2025-01-12"
                time:
                  type: string
                  example: "14:40"
      responses:
        '200':
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      tags: [Appointments]
      summary: Delete Appointment
      operationId: deleteAppointment
      responses:
        '200':
          description: Appointment deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  # ── Treatments ────────────────────────────────────────────────────────────

  /api/treatments:
    get:
      tags: [Treatments]
      summary: Get All Treatments
      operationId: getAllTreatments
      responses:
        '200':
          description: List of treatments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Treatment'
        '401':
          description: Unauthorized

    post:
      tags: [Treatments]
      summary: Add Treatment
      operationId: addTreatment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appointment_id, diagnosis, prescription]
              properties:
                appointment_id:
                  type: integer
                  example: 1
                visit_type:
                  type: string
                  example: In-person
                tests_done:
                  type: string
                  example: Blood pressure, ECG
                diagnosis:
                  type: string
                  example: Hypertension
                prescription:
                  type: string
                  example: Amlodipine 5mg daily
                notes:
                  type: string
                  example: Monitor BP daily
                next_visit_date:
                  type: string
                  format: date
                  example: "2025-12-25"
                medicines:
                  type: array
                  items:
                    $ref: '#/components/schemas/Medicine'
      responses:
        '201':
          description: Treatment added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Treatment'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - doctor only

  /api/treatment/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1

    put:
      tags: [Treatments]
      summary: Update Treatment
      operationId: updateTreatment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                diagnosis:
                  type: string
                prescription:
                  type: string
                notes:
                  type: string
                next_visit_date:
                  type: string
                  format: date
                medicines:
                  type: array
                  items:
                    $ref: '#/components/schemas/Medicine'
      responses:
        '200':
          description: Treatment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Treatment'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

    delete:
      tags: [Treatments]
      summary: Delete Treatment
      operationId: deleteTreatment
      responses:
        '200':
          description: Treatment deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  # ── Availability ──────────────────────────────────────────────────────────

  /api/availabilities:
    get:
      tags: [Availability]
      summary: Get Availability
      operationId: getAvailability
      responses:
        '200':
          description: List of availabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Availability'
        '401':
          description: Unauthorized

    post:
      tags: [Availability]
      summary: Add Availability
      operationId: addAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Availability'
      responses:
        '201':
          description: Availability added
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - doctor only

  /api/doctor/availability/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1

    put:
      tags: [Availability]
      summary: Update Availability
      operationId: updateAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Availability'
      responses:
        '200':
          description: Availability updated
        '401':
          description: Unauthorized
        '404':
          description: Not found

    delete:
      tags: [Availability]
      summary: Delete Availability
      operationId: deleteAvailability
      responses:
        '200':
          description: Availability deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found

  # ── Blacklist ─────────────────────────────────────────────────────────────

  /api/user/{id}/blacklist:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 2

    post:
      tags: [Blacklist]
      summary: Blacklist User
      operationId: blacklistUser
      responses:
        '200':
          description: User blacklisted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - admin only
        '404':
          description: User not found

    delete:
      tags: [Blacklist]
      summary: Remove Blacklist
      operationId: removeBlacklist
      responses:
        '200':
          description: Blacklist removed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - admin only
        '404':
          description: User not found

  # ── Search ────────────────────────────────────────────────────────────────

  /api/search/doctors:
    get:
      tags: [Search]
      summary: Search Doctors
      operationId: searchDoctors
      security: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            example: cardiologist
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [name, specialization, department]
            example: specialization
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Doctor'

  /api/search/patients:
    get:
      tags: [Search]
      summary: Search Patients
      operationId: searchPatients
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            example: john
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [name, email]
            example: name
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
        '401':
          description: Unauthorized

  # ── Dashboard ─────────────────────────────────────────────────────────────

  /api/admin/dashboard:
    get:
      tags: [Dashboard]
      summary: Admin Dashboard
      operationId: adminDashboard
      responses:
        '200':
          description: Admin dashboard data
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - admin only

  /api/patient/dashboard:
    get:
      tags: [Dashboard]
      summary: Patient Dashboard
      operationId: patientDashboard
      responses:
        '200':
          description: Patient dashboard data
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - patient only

  # ── Backend Jobs ──────────────────────────────────────────────────────────

  /api/export:
    post:
      tags: [Backend Jobs]
      summary: Trigger CSV Export
      operationId: triggerExport
      responses:
        '202':
          description: Export task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: d8cfa83b-1d5a-4181-a7f7-6e3b17e76ede
                  status:
                    type: string
                    example: PENDING
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - patient only

  /api/csv_result/{task_id}:
    get:
      tags: [Backend Jobs]
      summary: Get CSV Export Result
      operationId: getCsvResult
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            example: d8cfa83b-1d5a-4181-a7f7-6e3b17e76ede
      responses:
        '200':
          description: CSV file ready for download
        '202':
          description: Task still processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                  ready:
                    type: boolean
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - can only download own exports
        '404':
          description: File not found