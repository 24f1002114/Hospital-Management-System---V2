          in: query
          required: true
          schema:
            type: string
          description: Search term
        - name: type
          in: query
          schema:
            type: string
            enum: [name, specialization]
            default: name
          description: Search type
      responses:
        '200':
          description: List of matching doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    age:
                      type: integer
                    gender:
                      type: string
                    specialization:
                      type: string
                    years_of_experience:
                      type: integer
                    bio:
                      type: string
                    departments:
                      type: array
                      items:
                        type: string
        '400':
          description: Search query is required or invalid search type
        '404':
          description: No doctors found

